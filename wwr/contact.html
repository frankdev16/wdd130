<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting Company. Reach out to us with questions about our rafting trips, safety guidelines, or to book your next river adventure today.">
    <meta name="author" content="Franklin Anyaogu">
    <title>Contact Us | White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <!-- header begins-------------------------------------- -->
    <header>
        <img src="images/whitewater-rafting-logo.png" alt="white water rafting company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <!-- header ends---------------------------------------- -->

    <main>
        <div class="contact-content">
            <section class="contact-info">
                <h2>White Water Rafting Company</h2>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </section>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3108.394355912161!2d-120.9398177240667!3d38.823428471739916!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x809affd5b7ffe421%3A0xa79f84ba7d6e9c2b!2sH2O%20Adventures!5e0!3m2!1sen!2sng!4v1775250825933!5m2!1sen!2sng"
              allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <section class="form-container">
                <form>
                    <fieldset class="contact-details">
                        <legend>contact information</legend>
                        <div class="form-item column2">
                            <label for="fullname">fullname:</label>
                            <input type="text" id="fullname" name="fullname" required>
                        </div>

                        <div class="form-item column2">
                            <label for="useremail">email:</label>
                            <input type="email" id="useremail" name="useremail" required>
                        </div>
                    </fieldset>
                    <fieldset class="questions">
                        <legend>questions</legend>
                        <div class="form-item column1">
                            <label for="browser">the purpose of inquiry </label>
                            <select name="browser" id="browser">
                                <option value="1">General Inquiry</option>
                                <option value="2">Reservation Question</option>
                                <option value="3">Website Suggestion</option>
                            </select>
                        </div>
                        <div class="form-item">
                            <label for="feedback">Please type in your message</label>
                            <textarea name="feedback" id="feedback" rows="5"
                              placeholder="Your message"></textarea>
                        </div>
                        <div class="form-item column1">
                            <label for="pet">do you want to subscribe to our daily news
                                letter?</label>
                            <input type="checkbox" name="pet" id="pet">
                        </div>

                    </fieldset>
                    <fieldset class="experience">
                        <legend>What is your rafting experience?</legend>
                        <div class="form-item radio-item">
                            <input type="radio" id="beginner" name="experience" value="beginner"
                              required>
                            <label for="beginner">Beginner</label>
                        </div>
                        <div class="form-item radio-item">
                            <input type="radio" id="intermediate" name="experience"
                              value="intermediate">
                            <label for="intermediate">Intermediate</label>
                        </div>
                        <div class="form-item radio-item">
                            <input type="radio" id="advanced" name="experience" value="advanced">
                            <label for="advanced">Advanced</label>
                        </div>
                    </fieldset>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
        <section class="employee-content">
            <h1>We are here to serve</h1>
            <div class="figure-class">
                <figure>
                    <img src="images/emp-1.jpeg" alt="employee image" class="emp-img">
                    <figcaption>Employee profile</figcaption>
                </figure>
                <figure>
                    <img src="images/passport.jpg" alt="employee image" class="emp-img">
                    <figcaption>Employee profile</figcaption>
                </figure>
                <figure>
                    <img src="images/emp-2.jpeg" alt="employee image" class="emp-img">
                    <figcaption>Employee profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <!-- footer begins-------------------------------------- -->
    <footer>
        <p> &copy; 2026 White Water Rafting Company | Franklin Anyaogu</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
    <!-- footer ends --------------------------------------- -->


</body>

</html>
