<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Welcome the the page of white water rafting. We offer safe, exciting trips and expert guides for families and adrenaline seekers.">
    <meta name="author" content="Franklin Anyaogu">
    <title>Home | White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <!-- header begins-------------------------------------- -->
    <header>
        <img src="images/whitewater-rafting-logo.png" alt="white water rafting company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <!-- header ends---------------------------------------- -->

    <!-- main begins--------------------------------------- -->
    <main>
        <div class="home">
            <img src="images/rafting2.webp" alt="a group of people rafting">
            <h1>Welcome to white water rafting</h1>
        </div>
        <form>
            <div class="form-item column1">
                <label for="pet">do you want to subscribe to our daily news
                    letter?</label>
                <input type="checkbox" name="pet" id="pet">
            </div>
            <fieldset class="contact-details">
                <legend>contact information</legend>
                <div class="form-item column2">
                    <label for="fullname">fullname:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="useremail">email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>
        </form>
        <section class="action-sect">
            <p>Have specific questions about group rates or safety?</p>
            <a href="contact.html">Contact Us</a>
        </section>
        <div class="figure-class">
            <figure>
                <img src="images/rafting2.webp" alt="employee image" class="emp-img">
                <figcaption>Half Day Adventure offers some of the best adventure you could think of
                </figcaption>
            </figure>
            <figure>
                <img src="images/rafting4.webp" alt="employee image" class="emp-img">
                <figcaption>Free city of Volantis is highly inspired by the legend of Aegon the
                    conqueror and his two sisters including their dragon; Miraxes, Vagar and
                    Balerion</figcaption>
            </figure>
            <figure>
                <img src="images/rafting5.webp" alt="employee image" class="emp-img">
                <figcaption>Summer Isles is for those who want that mediterranean look along with
                    ethereal scenes</figcaption>
            </figure>
        </div>
    </main>
    <!-- main ends------------------------------------------ -->

    <!-- footer begins-------------------------------------- -->
    <footer>
        <p> &copy; 2026 White Water Rafting Company | Franklin Anyaogu</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
    <!-- footer ends --------------------------------------- -->


</body>

</html>
